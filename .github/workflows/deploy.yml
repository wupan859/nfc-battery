name: Deploy to CloudBase Static Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install CloudBase CLI
        run: npm i -g @cloudbase/cli

      - name: Login CloudBase
        run: tcb login --apiKeyId ${{ secrets.TCB_SECRET_ID }} --apiKey ${{ secrets.TCB_SECRET_KEY }}

      - name: Prepare static files
        run: |
          mkdir -p static
          cp index.html style.css main.js config.js static/

      - name: Deploy to CloudBase Static Hosting
        run: tcb hosting deploy ./static / -e ${{ secrets.TCB_ENV_ID }}
